name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests sympy python-dateutil pytest Jinja2 Markdown PyYAML bleach Pillow

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Syntax check bundled scripts
        run: |
          for f in proof-engine/skills/proof-engine/scripts/*.py; do
            python -c "import py_compile; py_compile.compile('$f', doraise=True)"
            echo "OK: $f"
          done

      - name: Validate example proofs (static analysis)
        run: |
          for d in docs/examples/*/; do
            if [ -f "$d/proof.py" ]; then
              echo "=== Validating $d/proof.py ==="
              python proof-engine/skills/proof-engine/scripts/validate_proof.py "$d/proof.py"
              echo ""
            fi
          done

      - name: Run example proofs and check JSON summary
        run: |
          FAILED=0
          for d in docs/examples/*/; do
            if [ -f "$d/proof.py" ]; then
              echo "=== Running $d/proof.py ==="
              if python "$d/proof.py" > "$d/output.txt" 2>&1; then
                # Check JSON summary exists and has required keys
                python3 -c "
          import json, sys
          text = open('${d}output.txt').read()
          if '=== PROOF SUMMARY (JSON) ===' not in text:
              print('FAIL: no JSON summary block')
              sys.exit(1)
          idx = text.index('=== PROOF SUMMARY (JSON) ===')
          data = json.loads(text[idx + len('=== PROOF SUMMARY (JSON) ==='):])
          required = {'fact_registry', 'claim_formal', 'verdict', 'key_results'}
          missing = required - set(data.keys())
          if missing:
              print(f'FAIL: missing keys: {missing}')
              sys.exit(1)
          print(f'PASS: verdict={data[\"verdict\"]}')
          " || FAILED=1
              else
                echo "FAIL: proof.py exited with non-zero status"
                cat "$d/output.txt"
                FAILED=1
              fi
              echo ""
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Some example proofs failed."
            exit 1
          fi
          echo "All example proofs passed."

  validate-site:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Jinja2 Markdown PyYAML bleach requests sympy python-dateutil Pillow

      - name: Find and validate new/changed proofs
        run: |
          MERGE_BASE=$(git merge-base HEAD origin/${{ github.base_ref }})
          PROOFS=$(git diff --name-only --diff-filter=ACMR "$MERGE_BASE"...HEAD -- 'site/proofs/' | xargs -I{} dirname {} | sort -u)
          if [ -z "$PROOFS" ]; then
            echo "No new proofs found"
            exit 0
          fi
          echo "$PROOFS" | while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "=== Validating $dir ==="
            python proof-engine/skills/proof-engine/scripts/validate_proof.py "$dir/proof.py"
            env -u GITHUB_TOKEN -u ACTIONS_RUNTIME_TOKEN \
              timeout 600 python tools/validate-site-proof.py "$dir"
          done

      - name: Build site (dry run)
        run: |
          python tools/build-site.py \
            --site-dir site \
            --output-dir _site \
            --base-url /proof-engine/ \
            --site-url https://yaniv-golan.github.io \
            --design-md docs/DESIGN.md \
            --hardening-rules-md proof-engine/skills/proof-engine/references/hardening-rules.md
